name: Update project timeline

on:
  push:
    branches: [master]
    paths:
      - "Week */**"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-timeline:
    runs-on: ubuntu-latest
    # avoid infinite loops when the bot itself commits
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history, needed for project completion dates

      - name: Regenerate timeline in README
        run: python3 scripts/update_timeline.py

      - name: Commit changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: auto-update project timeline"
          git push
